<!doctype html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8"/>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>gel</title>
</head>
<body>

<button class="gel theme-toggle" id="theme-toggle" aria-label="Toggle light/dark mode">☀</button>

<div class="demo-scene">
    <div class="demo-blob demo-blob--magenta"></div>
    <div class="demo-blob demo-blob--orange"></div>
    <!--  <div class="demo-blob demo-blob&#45;&#45;green"></div>-->
    <!--  <div class="demo-blob demo-blob&#45;&#45;blue"></div>-->
    <div class="demo-blob demo-blob--yellow"></div>
    <div class="demo-blob demo-blob--white"></div>
</div>

<main class="demo">
    <h1 class="demo-title">Gel</h1>

    <div class="demo-row">
        <button class="gel">Violet</button>
        <button class="gel" style="--gel-hue: 210; --gel-saturation: 62%; --gel-body-top: 60%; --gel-lightness: 67%; --gel-body-bot: 84%; --gel-border-hue: 257; --gel-border-sat: 87%">Ocean</button>
        <button class="gel" style="--gel-hue: 130; --gel-saturation: 72%; --gel-lightness: 38%">Mint</button>
        <button class="gel" style="--gel-hue: 0; --gel-saturation: 85%">Ruby</button>
        <button class="gel" style="--gel-hue: 38; --gel-saturation: 90%; --gel-lightness: 50%">Amber</button>
    </div>

    <div class="demo-row">
        <button class="gel" style="font-size: 0.8rem; padding: 0.3rem 0.9rem">Small</button>
        <button class="gel" style="padding: 0.75rem 2.25rem; font-size: 1.15rem">Large</button>
        <button class="gel" style="--gel-hue: 220; --gel-saturation: 15%">Neutral</button>
    </div>

    <p class="demo-label">Inputs</p>

    <div class="demo-row">
        <div class="gel-input-wrapper gel-surface">
            <input class="gel-input" type="text" placeholder="Gel input…"/>
        </div>
        <div class="gel-input-wrapper gel-surface" style="--gel-hue: 280; --gel-saturation: 40%">
            <input class="gel-input" type="text" placeholder="Violet…"/>
        </div>
        <div class="gel-input-wrapper gel-surface" style="--gel-hue: 210; --gel-saturation: 50%; --gel-lightness: 70%; --gel-border-hue: 257; --gel-border-sat: 87%">
            <input class="gel-input" type="text" placeholder="Ocean…"/>
        </div>
    </div>

    <p class="demo-label">Sliders</p>

    <div class="demo-column">
        <div class="gel-slider" data-gel-slider role="slider" aria-valuemin="0" aria-valuemax="100" aria-valuenow="40"
             tabindex="0">
            <div class="gel-slider__track">
                <div class="gel-slider__fill" style="--gel-hue: 280"></div>
                <div class="gel-slider__thumb-positioner">
                    <div class="gel gel-slider__thumb" style="--gel-hue: 280"></div>
                </div>
            </div>
        </div>
        <div class="gel-slider" data-gel-slider role="slider" aria-valuemin="0" aria-valuemax="100" aria-valuenow="65"
             tabindex="0">
            <div class="gel-slider__track">
                <div class="gel-slider__fill" style="--gel-hue: 210; --gel-saturation: 62%; --gel-body-top: 60%; --gel-lightness: 67%; --gel-body-bot: 84%; --gel-border-hue: 257; --gel-border-sat: 87%"></div>
                <div class="gel-slider__thumb-positioner">
                    <div class="gel gel-slider__thumb"
                         style="--gel-hue: 210; --gel-saturation: 62%; --gel-body-top: 60%; --gel-lightness: 67%; --gel-body-bot: 84%; --gel-border-hue: 257; --gel-border-sat: 87%"></div>
                </div>
            </div>
        </div>
        <div class="gel-slider" data-gel-slider role="slider" aria-valuemin="0" aria-valuemax="100" aria-valuenow="22"
             tabindex="0">
            <div class="gel-slider__track">
                <div class="gel-slider__fill" style="--gel-hue: 0; --gel-saturation: 85%"></div>
                <div class="gel-slider__thumb-positioner">
                    <div class="gel gel-slider__thumb" style="--gel-hue: 0; --gel-saturation: 85%"></div>
                </div>
            </div>
        </div>
    </div>

    <p class="demo-label">Checkboxes</p>
    <div class="demo-row">
        <label class="gel-checkbox">
            <input type="checkbox" class="gel-checkbox__input"/>
            <span class="gel-checkbox__box gel-surface">
        <svg class="gel-checkbox__check" viewBox="0 0 12 10" fill="none">
          <polyline points="1,6 4,9 11,1" stroke="white" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round"/>
        </svg>
      </span>
        </label>
        <label class="gel-checkbox">
            <input type="checkbox" class="gel-checkbox__input" checked/>
            <span class="gel-checkbox__box gel-surface">
        <svg class="gel-checkbox__check" viewBox="0 0 12 10" fill="none">
          <polyline points="1,6 4,9 11,1" stroke="white" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round"/>
        </svg>
      </span>
        </label>
        <label class="gel-checkbox" style="--gel-hue: 210; --gel-saturation: 62%; --gel-border-hue: 257; --gel-border-sat: 87%">
            <input type="checkbox" class="gel-checkbox__input" checked/>
            <span class="gel-checkbox__box gel-surface">
        <svg class="gel-checkbox__check" viewBox="0 0 12 10" fill="none">
          <polyline points="1,6 4,9 11,1" stroke="white" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round"/>
        </svg>
      </span>
        </label>
        <label class="gel-checkbox" style="--gel-hue: 0; --gel-saturation: 85%">
            <input type="checkbox" class="gel-checkbox__input" checked/>
            <span class="gel-checkbox__box gel-surface">
        <svg class="gel-checkbox__check" viewBox="0 0 12 10" fill="none">
          <polyline points="1,6 4,9 11,1" stroke="white" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round"/>
        </svg>
      </span>
        </label>
    </div>

    <p class="demo-label">Radio buttons</p>
    <div class="demo-row">
        <label class="gel-radio">
            <input type="radio" name="gel-radio-demo" class="gel-radio__input"/>
            <span class="gel-radio__box gel-surface"><span class="gel-radio__dot"></span></span>
        </label>
        <label class="gel-radio">
            <input type="radio" name="gel-radio-demo" class="gel-radio__input" checked/>
            <span class="gel-radio__box gel-surface"><span class="gel-radio__dot"></span></span>
        </label>
        <label class="gel-radio" style="--gel-hue: 210; --gel-saturation: 62%; --gel-border-hue: 257; --gel-border-sat: 87%">
            <input type="radio" name="gel-radio-demo2" class="gel-radio__input" checked/>
            <span class="gel-radio__box gel-surface"><span class="gel-radio__dot"></span></span>
        </label>
        <label class="gel-radio" style="--gel-hue: 130; --gel-saturation: 72%; --gel-lightness: 38%">
            <input type="radio" name="gel-radio-demo3" class="gel-radio__input" checked/>
            <span class="gel-radio__box gel-surface"><span class="gel-radio__dot"></span></span>
        </label>
    </div>

    <p class="demo-label">Progress</p>

    <div class="demo-column">
        <div class="gel-progress" role="progressbar" aria-valuenow="65" aria-valuemin="0" aria-valuemax="100">
            <div class="gel-progress__fill" style="--gel-hue: 280; width: 65%"></div>
        </div>
        <div class="gel-progress" role="progressbar" aria-valuenow="38" aria-valuemin="0" aria-valuemax="100">
            <div class="gel-progress__fill"
                 style="--gel-hue: 130; --gel-saturation: 72%; --gel-lightness: 38%; width: 38%"></div>
        </div>
        <div class="gel-progress" role="progressbar" aria-valuenow="82" aria-valuemin="0" aria-valuemax="100">
            <div class="gel-progress__fill" style="--gel-hue: 0; --gel-saturation: 85%; width: 82%"></div>
        </div>
        <div class="gel-progress" role="progressbar" aria-valuenow="51" aria-valuemin="0" aria-valuemax="100">
            <div class="gel-progress__fill"
                 style="--gel-hue: 38; --gel-saturation: 90%; --gel-lightness: 50%; width: 51%"></div>
        </div>
    </div>
</main>

<script type="module" src="/src/main.js"></script>
</body>
</html>
