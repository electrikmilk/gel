<!doctype html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8"/>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>gel</title>
</head>
<body>

<button class="gel theme-toggle" id="theme-toggle" aria-label="Toggle light/dark mode">☀</button>

<div class="demo-scene">
    <div class="demo-blob demo-blob--magenta"></div>
    <div class="demo-blob demo-blob--orange"></div>
    <div class="demo-blob demo-blob--yellow"></div>
    <div class="demo-blob demo-blob--white"></div>
</div>

<main class="demo">
    <h1 class="demo-title">Gel</h1>

    <div class="demo-row">
        <button class="gel gel-violet">Violet</button>
        <button class="gel gel-ocean">Ocean</button>
        <button class="gel gel-moss">Moss</button>
        <button class="gel gel-ruby">Ruby</button>
        <button class="gel gel-amber">Amber</button>
    </div>

    <div class="demo-row">
        <button class="gel gel-violet" style="font-size: 0.8rem; padding: 0.3rem 0.9rem">Small</button>
        <button class="gel gel-violet" style="padding: 0.75rem 2.25rem; font-size: 1.15rem">Large</button>
        <button class="gel gel-neutral">Neutral</button>
    </div>

    <p class="demo-label">Inputs</p>

    <div class="demo-row">
        <div class="gel-input-wrapper gel-surface">
            <input class="gel-input" type="text" placeholder="Gel input…"/>
        </div>
        <div class="gel-input-wrapper gel-surface gel-violet">
            <input class="gel-input" type="text" placeholder="Violet…"/>
        </div>
        <div class="gel-input-wrapper gel-surface gel-ocean">
            <input class="gel-input" type="text" placeholder="Ocean…"/>
        </div>
    </div>

    <p class="demo-label">Sliders</p>

    <div class="demo-column">
        <div class="gel-slider" data-gel-slider role="slider" aria-label="Violet slider" aria-valuemin="0" aria-valuemax="100" aria-valuenow="40"
             tabindex="0">
            <div class="gel-slider__track">
                <div class="gel-slider__fill gel-violet"></div>
                <div class="gel-slider__thumb-positioner">
                    <div class="gel gel-slider__thumb gel-violet"></div>
                </div>
            </div>
        </div>
        <div class="gel-slider" data-gel-slider role="slider" aria-label="Ocean slider" aria-valuemin="0" aria-valuemax="100" aria-valuenow="65"
             tabindex="0">
            <div class="gel-slider__track">
                <div class="gel-slider__fill gel-ocean"></div>
                <div class="gel-slider__thumb-positioner">
                    <div class="gel gel-slider__thumb gel-ocean"></div>
                </div>
            </div>
        </div>
        <div class="gel-slider" data-gel-slider role="slider" aria-label="Ruby slider" aria-valuemin="0" aria-valuemax="100" aria-valuenow="22"
             tabindex="0">
            <div class="gel-slider__track">
                <div class="gel-slider__fill gel-ruby"></div>
                <div class="gel-slider__thumb-positioner">
                    <div class="gel gel-slider__thumb gel-ruby"></div>
                </div>
            </div>
        </div>
    </div>

    <p class="demo-label">Checkboxes</p>
    <div class="demo-row">
        <label class="gel-checkbox">
            <input type="checkbox" class="gel-checkbox__input" aria-label="Checkbox"/>
            <span class="gel-checkbox__box gel-surface">
                <svg class="gel-checkbox__check" viewBox="0 0 12 10" fill="none">
                    <polyline points="1,6 4,9 11,1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </span>
        </label>
        <label class="gel-checkbox gel-ocean">
            <input type="checkbox" class="gel-checkbox__input" checked aria-label="Checkbox"/>
            <span class="gel-checkbox__box gel-surface">
                <svg class="gel-checkbox__check" viewBox="0 0 12 10" fill="none">
                    <polyline points="1,6 4,9 11,1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </span>
        </label>
        <label class="gel-checkbox gel-violet">
            <input type="checkbox" class="gel-checkbox__input" checked aria-label="Checkbox"/>
            <span class="gel-checkbox__box gel-surface">
                <svg class="gel-checkbox__check" viewBox="0 0 12 10" fill="none">
                    <polyline points="1,6 4,9 11,1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </span>
        </label>
        <label class="gel-checkbox gel-ruby">
            <input type="checkbox" class="gel-checkbox__input" checked aria-label="Checkbox"/>
            <span class="gel-checkbox__box gel-surface">
                <svg class="gel-checkbox__check" viewBox="0 0 12 10" fill="none">
                    <polyline points="1,6 4,9 11,1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </span>
        </label>
    </div>

    <p class="demo-label">Radio buttons</p>
    <div class="demo-row">
        <label class="gel-radio">
            <input type="radio" name="gel-radio-demo" class="gel-radio__input" aria-label="Radio button"/>
            <span class="gel-radio__box gel-surface"><span class="gel-radio__dot"></span></span>
        </label>
        <label class="gel-radio gel-ocean">
            <input type="radio" name="gel-radio-demo" class="gel-radio__input" checked aria-label="Radio button"/>
            <span class="gel-radio__box gel-surface"><span class="gel-radio__dot"></span></span>
        </label>
        <label class="gel-radio gel-violet">
            <input type="radio" name="gel-radio-demo2" class="gel-radio__input" checked aria-label="Radio button"/>
            <span class="gel-radio__box gel-surface"><span class="gel-radio__dot"></span></span>
        </label>
        <label class="gel-radio gel-moss">
            <input type="radio" name="gel-radio-demo3" class="gel-radio__input" checked aria-label="Radio button"/>
            <span class="gel-radio__box gel-surface"><span class="gel-radio__dot"></span></span>
        </label>
    </div>

    <p class="demo-label">Progress</p>

    <div class="demo-column">
        <div class="gel-progress" role="progressbar" aria-label="Violet progress" aria-valuenow="65" aria-valuemin="0" aria-valuemax="100">
            <div class="gel-progress__fill gel-violet" style="width: 65%"></div>
        </div>
        <div class="gel-progress" role="progressbar" aria-label="Moss progress" aria-valuenow="38" aria-valuemin="0" aria-valuemax="100">
            <div class="gel-progress__fill gel-moss" style="width: 38%"></div>
        </div>
        <div class="gel-progress" role="progressbar" aria-label="Ruby progress" aria-valuenow="82" aria-valuemin="0" aria-valuemax="100">
            <div class="gel-progress__fill gel-ruby" style="width: 82%"></div>
        </div>
        <div class="gel-progress" role="progressbar" aria-label="Amber progress" aria-valuenow="51" aria-valuemin="0" aria-valuemax="100">
            <div class="gel-progress__fill gel-amber" style="width: 51%"></div>
        </div>
    </div>
</main>

<script type="module" src="/src/main.js"></script>
</body>
</html>
